<!DOCTYPE html>
<html>
<head>
    <title>Prank Lucu!</title>
    <style>
        body { 
            text-align: center; 
            font-family: Arial; 
            background: black;
            color: lime;
            padding: 50px;
        }
        .box {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid lime;
            max-width: 500px;
            margin: auto;
        }
        button {
            padding: 15px 30px;
            background: lime;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ VIRUS DETECTED! ⚠️</h1>
        <p id="counter">Menghapus file dalam 10 detik...</p>
        <button onclick="prank()">Klik untuk selamat!</button>
    </div>

    <script>
        let time = 10;
        function prank() {
            document.getElementById('counter').innerHTML = '🤣 PRANK! Ga ada virus kok!';
            document.querySelector('.box').style.borderColor = 'gold';
            document.querySelector('h1').innerHTML = '🎉 SELAMAT! 🎉';
        }

        setInterval(() => {
            time--;
            if (time > 0) {
                document.getElementById('counter').innerHTML = `Menghapus file dalam ${time} detik...`;
            } else {
                document.getElementById('counter').innerHTML = '😅 Tenang, cuma prank!';
            }
        }, 1000);
    </script>
</body>
</html>
